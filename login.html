<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>회원로그인</title>
  <!-- 네이버 로그인 SDK -->
  <script type="text/javascript" src="https://static.nid.naver.com/js/naverLogin_implicit-1.0.3.js" charset="utf-8"></script>
  <style>
    /* 기존 CSS 그대로 유지 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; text-align: center; color: #333; margin: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .login-container { margin-bottom: 1rem; }
    .btn {
      display: inline-block;
      width: 280px;
      margin: 0.5rem auto;
      padding: 0.8rem 0;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    .naver-btn {
      background-color: #03C75A;
      color: #fff;
    }
    .kakao-btn {
      background-color: #FEE500;
      color: #000;
    }
    .notice {
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #666;
    }
    .info-box {
      max-width: 600px;
      margin: 1rem auto;
      background-color: #efefff;
      border-radius: 5px;
      padding: 1rem;
      text-align: left;
      color: #333;
    }
    .info-box h2 {
      margin-bottom: 0.5rem;
      font-size: 1rem;
      font-weight: bold;
    }
    .info-box ol {
      list-style-type: decimal;
      padding-left: 1.2rem;
    }
    .info-box li {
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>회원로그인</h1>

  <!-- 네이버 로그인 영역 -->
  <div class="login-container" id="naver_id_login"></div>

  <!-- 카카오 로그인 커스텀 버튼 -->
  <div class="login-container">
    <a href="#" class="btn kakao-btn" onclick="onKakaoLogin()">
      카카오 로그인
    </a>
  </div>

  <div class="notice">* 네이버, 카카오 개인정보 걱정없이 로그인이 가능합니다.</div>

  <div class="info-box">
    <h2>GoHigher가 제공하는 서비스</h2>
    <ol>
      <li>직접 분석하여 성장형 종목추천</li>
      <li>간편한 자산관리 시스템 제공</li>
      <li>경제지표 분석을 통해 시장흐름포착</li>
      <li>섹터별 유망종목 안내</li>
      <li>이벤트, 뉴스 실시간 분석</li>
      <li>유명인의 포트폴리오 관람</li>
      <li>매주 경제 일정 안내</li>
    </ol>
  </div>

  <!-- 네이버 로그인 설정 스크립트 -->
  <script type="text/javascript">
    // 실제 Naver Client ID와 리다이렉트 URL을 설정하세요.
    var naver_id_login = new naver_id_login("L6zLacbhxxtrt7F39xKt", "https://gohigher.kr/");
    var state = naver_id_login.getUniqState();
    naver_id_login.setButton("white", 2, 40);
    // setDomain에 꼭 "https://gohigher.kr" 형태로만 넣어야 하는 것은 아니지만,
    // 현재 설정과 일치하도록 관리하세요.
    naver_id_login.setDomain("https://gohigher.kr/login");
    naver_id_login.setState(state);
    naver_id_login.setPopup();
    naver_id_login.init_naver_id_login();
  </script>

  <!-- 카카오 로그인 스크립트 -->
  <script>
    function onKakaoLogin() {
      // 여기에 실제 카카오 REST API 키를 넣어 주세요.
      const REST_API_KEY = '38ace66b21a1efae075caae0f778eb4c';
      // 카카오 개발자 콘솔에 등록된 리다이렉트 URI와 동일하게 설정해야 합니다.
      const redirectUri = 'https://gohigher.kr/auth/kakao/callback';

      const kakaoAuthUrl = `https://kauth.kakao.com/oauth/authorize?client_id=${REST_API_KEY}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=code`;

      // 카카오 인증 페이지로 이동
      window.location.href = kakaoAuthUrl;
    }
  </script>
</body>
</html>

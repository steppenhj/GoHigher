<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>회원로그인</title>
  <!-- 네이버 로그인 SDK -->
  <script type="text/javascript" src="https://static.nid.naver.com/js/naverLogin_implicit-1.0.3.js" charset="utf-8"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; text-align: center; color: #333; margin: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .login-container { margin-bottom: 1rem; }
    .btn {
      display: inline-block;
      width: 280px;
      margin: 0.5rem auto;
      padding: 0.8rem 0;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    .naver-btn {
      background-color: #03C75A;
      color: #fff;
    }
    .kakao-btn {
      background-color: #FEE500;
      color: #000;
    }
    .notice {
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #666;
    }
    .info-box {
      max-width: 600px;
      margin: 1rem auto;
      background-color: #efefff;
      border-radius: 5px;
      padding: 1rem;
      text-align: left;
      color: #333;
    }
    .info-box h2 {
      margin-bottom: 0.5rem;
      font-size: 1rem;
      font-weight: bold;
    }
    .info-box ol {
      list-style-type: decimal;
      padding-left: 1.2rem;
    }
    .info-box li {
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>회원로그인</h1>

  <!-- 네이버 로그인 버튼 렌더링 영역 -->
  <div class="login-container" id="naver_id_login"></div>

  <!-- 카카오 로그인 커스텀 버튼 (예시) -->
  <div class="login-container">
    <a href="#" class="btn kakao-btn" onclick="onKakaoLogin()">
      카카오 로그인
    </a>
  </div>

  <div class="notice">* 네이버, 카카오 개인정보 걱정없이 로그인이 가능합니다.</div>

  <div class="info-box">
    <h2>GoHigher가 제공하는 서비스</h2>
    <ol>
      <li>직접 분석하여 성장형 종목추천</li>
      <li>간편한 자산관리 시스템 제공</li>
      <li>경제지표 분석을 통해 시장흐름포착</li>
      <li>섹터별 유망종목 안내</li>
      <li>이벤트, 뉴스 실시간 분석</li>
      <li>유명인의 포트폴리오 관람</li>
      <li>매주 경제 일정 안내</li>
    </ol>
  </div>

  <script type="text/javascript">
    // ---------------------------------------
    // (1) 네이버 로그인 객체 생성
    // ---------------------------------------
    var naver_id_login = new naver_id_login(
      "L6zLacbhxxtrt7F39xKt",     // 본인의 client_id
      "https://gohigher.kr/"     // 콜백 URL (네이버 개발자센터에 등록한 것과 동일)
    );

    // (2) 상태 토큰 생성 (CSRF 방지용)
    var state = naver_id_login.getUniqState();
    naver_id_login.setState(state);

    // (3) 버튼 스타일 설정
    // - setButton("버튼색상", "글자크기", "가로길이" ...)
    // - "green", 3, 50 등등
    // - 단, 최신 스펙에서는 color/size 지정 없이도 사용 가능
    naver_id_login.setButton("white", 2, 40);

    // (4) 로그인 유지 및 도메인 설정
    naver_id_login.setDomain("gohigher.kr");

    // (5) 팝업 여부 설정 (팝업으로 열고 싶을 때)
    // naver_id_login.setPopup(); 

    // (6) 초기화
    naver_id_login.init_naver_id_login();

    // (7) 로그인이 완료된 뒤, 프로필 정보를 가져오는 콜백
    function naverSignInCallback() {
      // 프로필 정보 가져오기
      const email = naver_id_login.getProfileData('email');
      const nickname = naver_id_login.getProfileData('nickname');
      const age = naver_id_login.getProfileData('age');

      console.log("네이버 로그인 성공!");
      console.log("이메일:", email);
      console.log("닉네임:", nickname);
      console.log("나이:", age);

      // -- 여기서 받은 정보로 회원 DB 등록, 세션 생성 등 후속 작업을 진행하면 됩니다. --
      // 예: 쿠키 혹은 로컬스토리지에 저장 후 메인 페이지로 이동:
      alert(nickname + "님, 네이버 로그인이 완료되었습니다!");

      // 로그인 후 메인 페이지로 이동
      window.location.href = "index.html";
    }

    // (8) 실제로 사용자 프로필 정보를 가져오기 위한 함수 호출
    // 로그인 완료 후(페이지가 콜백 URL로 돌아온 뒤) 자동 실행됨
    naver_id_login.get_naver_userprofile("naverSignInCallback");

    // (9) 카카오 로그인 버튼 (예시)
    function onKakaoLogin() {
      alert("카카오 로그인 연동 예정입니다.");
      // 실제 카카오 개발자 센터 REST API 연동 필요
    }
  </script>
</body>
</html>

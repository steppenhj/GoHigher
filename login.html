<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>회원로그인</title>
  <!-- 네이버 로그인 SDK -->
  <script type="text/javascript" src="https://static.nid.naver.com/js/naverLogin_implicit-1.0.3.js" charset="utf-8"></script>
  <style>
    /* 기본 CSS */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; text-align: center; color: #333; margin: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .login-container { margin-bottom: 1rem; }

    /* ------------------------
       (1) 공통 버튼 스타일 (.btn)
       ------------------------ */
    .btn {
      display: inline-block;
      width: 280px;
      margin: 0.5rem auto;
      padding: 0.8rem 0;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none; /* 필요 시 border 추가 가능 */
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    /* ------------------------
       (2) 네이버 버튼 전용 스타일
       ------------------------ */
    .custom-naver-btn {
      background-color: #03C75A;
      color: #fff;
    }

    /* ------------------------
       (3) 카카오 버튼 전용 스타일
       ------------------------ */
    .kakao-btn {
      background-color: #FEE500;
      color: #000;
    }

    /* 나머지 스타일 */
    .notice {
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #666;
    }
    .info-box {
      max-width: 600px;
      margin: 1rem auto;
      background-color: #efefff;
      border-radius: 5px;
      padding: 1rem;
      text-align: left;
      color: #333;
    }
    .info-box h2 {
      margin-bottom: 0.5rem;
      font-size: 1rem;
      font-weight: bold;
    }
    .info-box ol {
      list-style-type: decimal;
      padding-left: 1.2rem;
    }
    .info-box li {
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>회원로그인</h1>

  <!-- 자동 렌더링용 컨테이너는 숨김 처리 -->
  <div id="naver_id_login" style="display:none;"></div>

  <!-- (A) 커스텀 네이버 로그인 버튼 -->
  <div class="login-container">
    <!-- 네이버 버튼에 .btn .custom-naver-btn 2개 클래스를 함께 적용 -->
    <button class="btn custom-naver-btn" id="customNaverLoginButton">
      네이버 로그인
    </button>
  </div>

  <!-- (B) 카카오 로그인 커스텀 버튼 -->
  <div class="login-container">
    <!-- 카카오 버튼도 .btn .kakao-btn 2개 클래스를 함께 적용 -->
    <a href="#" class="btn kakao-btn" onclick="onKakaoLogin()">
      카카오 로그인
    </a>
  </div>

  <div class="notice">* 네이버, 카카오 개인정보 걱정없이 로그인이 가능합니다.</div>

  <div class="info-box">
    <h2>GoHigher가 제공하는 서비스</h2>
    <ol>
      <li>직접 분석하여 성장형 종목추천</li>
      <li>간편한 자산관리 시스템 제공</li>
      <li>경제지표 분석을 통해 시장흐름포착</li>
      <li>섹터별 유망종목 안내</li>
      <li>이벤트, 뉴스 실시간 분석</li>
      <li>유명인의 포트폴리오 관람</li>
      <li>매주 경제 일정 안내</li>
    </ol>
  </div>

  <script type="text/javascript">
    // 네이버 로그인 SDK 초기화
    var naver_id_login = new naver_id_login("L6zLacbhxxtrt7F39xKt", "https://gohigher.kr/");
    var state = naver_id_login.getUniqState();
    // 커스텀 버튼을 사용할 경우, 자동 렌더링용 setButton은 호출하지 않습니다.
    // naver_id_login.setButton("white", 2, 40);
    naver_id_login.setState(state);
    naver_id_login.setDomain("https://gohigher.kr/login");
    naver_id_login.setPopup();
    naver_id_login.init_naver_id_login();

    // (A) 커스텀 네이버 로그인 버튼 클릭 시 로그인 요청
    document.getElementById("customNaverLoginButton").addEventListener("click", function(){
      naver_id_login.doLogin();
    });

    // (B) 카카오 로그인 함수 (예시)
    function onKakaoLogin() {
      alert("카카오 로그인 클릭!");
      // 실제 카카오 로그인 로직을 구현하세요.
    }
  </script>
</body>
</html>
